services:
  # AI Agent Service
  - type: web
    name: nguyen-thanh-binh-agent
    env: docker
    dockerfilePath: Dockerfile
    dockerContext: ./06-lab-complete
    plan: free
    envVars:
      - key: PORT
        value: 8000
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: AGENT_API_KEY
        generateValue: true
      - key: RATE_LIMIT_PER_MINUTE
        value: 5
      - key: DAILY_BUDGET_USD
        value: 5.0
    healthCheckPath: /health
