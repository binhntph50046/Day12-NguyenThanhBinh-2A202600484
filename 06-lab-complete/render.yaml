services:
  - type: web
    name: nguyen-thanh-binh-agent
    env: docker
    dockerfilePath: ./Dockerfile
    plan: free
    region: oregon
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8000
      - key: HOST
        value: 0.0.0.0
      - key: ENVIRONMENT
        value: production
      - key: DEBUG
        value: false
      - key: APP_NAME
        value: Production AI Agent
      - key: APP_VERSION
        value: 1.0.0
      - key: AGENT_API_KEY
        generateValue: true
      - key: JWT_SECRET
        generateValue: true
      - key: RATE_LIMIT_PER_MINUTE
        value: 5
      - key: DAILY_BUDGET_USD
        value: 5.0
      - key: LLM_MODEL
        value: gpt-4o-mini
      - key: ALLOWED_ORIGINS
        value: "*"