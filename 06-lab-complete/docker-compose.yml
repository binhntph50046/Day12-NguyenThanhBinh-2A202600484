version: "3.9"

# ============================================================
# Docker Compose Stack — Agent + Redis
# 
# Tại sao cần Redis?
# - Rate limiting: Share state giữa các agent instances
# - Session storage: Conversation history
# - Cache: Giảm latency
# 
# Production: Dùng managed Redis (Railway Redis, AWS ElastiCache)
# ============================================================

services:
  # ─────────────────────────────────────────────────────────
  # AI Agent Service
  # ─────────────────────────────────────────────────────────
  agent:
    build: .
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=staging
      - APP_NAME=Production AI Agent
      - REDIS_URL=redis://redis:6379/0
    env_file:
      - .env.local
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  # ─────────────────────────────────────────────────────────
  # Redis — Rate limiting & Session storage
  # ─────────────────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    command: redis-server --maxmemory 128mb --maxmemory-policy allkeys-lru
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
    volumes:
      - redis-data:/data

volumes:
  redis-data:
